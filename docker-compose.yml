version: "3.9"

services:
  db:
    image: postgres:17
    container_name: resume-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_db
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: resume-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/resume_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: resume-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend